<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Family Budget</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;0,9..40,800;1,9..40,400&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --sky:    #38b6e8;
  --sky2:   #1a9fd4;
  --sky3:   #0d87bb;
  --sky-lt: #e0f5fd;
  --sky-bg: #f0faff;
  --mint:   #2ed8a8;
  --coral:  #ff6b7a;
  --sun:    #ffb347;
  --ink:    #1a2a3a;
  --muted:  #7a9ab0;
  --border: #c8e8f5;
  --paper:  #f8fcff;
  --white:  #ffffff;
  --shadow: 0 4px 20px rgba(56,182,232,.15);
  --shadow2:0 2px 10px rgba(56,182,232,.12);
  --font:   'DM Sans','Noto Sans JP',sans-serif;
  --radius: 16px;
  --radius-sm: 10px;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body {
  font-family: var(--font);
  background: linear-gradient(160deg, #e8f7fd 0%, #f5fbff 50%, #eaf6f0 100%);
  min-height: 100vh;
  color: var(--ink);
  font-size: 15px;
}

/* ── HEADER ── */
.app-header {
  background: linear-gradient(135deg, var(--sky) 0%, var(--sky2) 60%, #1abbcc 100%);
  padding: 1rem 1rem .8rem;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 3px 16px rgba(26,159,212,.35);
}
.app-title {
  font-size: 1.25rem; font-weight: 900; color: #fff;
  letter-spacing: .04em; display: flex; align-items: center; gap: .45rem;
}
.app-title .icon { font-size: 1.4rem; }
.header-right { display: flex; align-items: center; gap: .5rem; }
.year-sel {
  background: rgba(255,255,255,.2); border: 1.5px solid rgba(255,255,255,.5);
  color: #fff; border-radius: 8px; padding: .28rem .55rem;
  font-family: var(--font); font-size: .85rem; font-weight: 700;
  -webkit-appearance: none; appearance: none; cursor: pointer;
}
.year-sel option { color: var(--ink); background: #fff; }
.reload-btn {
  background: rgba(255,255,255,.2); border: 1.5px solid rgba(255,255,255,.5);
  color: #fff; border-radius: 8px; padding: .28rem .6rem;
  font-size: .9rem; cursor: pointer; font-family: var(--font); transition: all .15s;
}
.reload-btn:active { background: rgba(255,255,255,.35); }

/* ── TAB NAV ── */
.tab-nav {
  display: flex; background: var(--white);
  border-bottom: 2px solid var(--border);
  position: sticky; top: 60px; z-index: 90;
  box-shadow: 0 2px 8px rgba(56,182,232,.08);
}
.tab-btn {
  flex: 1; padding: .65rem .3rem; text-align: center;
  font-size: .82rem; font-weight: 700; color: var(--muted);
  cursor: pointer; border-bottom: 3px solid transparent;
  transition: all .2s; letter-spacing: .02em;
  font-family: var(--font);
}
.tab-btn.active { color: var(--sky2); border-bottom-color: var(--sky); }
.tab-btn .tab-icon { font-size: 1.1rem; display: block; margin-bottom: .1rem; }

/* ── PAGE ── */
.page { display: none; padding: 1rem; max-width: 560px; margin: 0 auto; }
.page.active { display: block; }

/* ── SECTION TITLE ── */
.sec-title {
  font-size: .78rem; font-weight: 800; color: var(--sky2);
  text-transform: uppercase; letter-spacing: .12em;
  margin: 1.2rem 0 .6rem; display: flex; align-items: center; gap: .4rem;
}
.sec-title::before {
  content: ''; display: inline-block; width: 4px; height: 14px;
  background: linear-gradient(180deg, var(--sky), var(--mint));
  border-radius: 2px;
}

/* ── CARD ── */
.card {
  background: var(--white); border-radius: var(--radius);
  box-shadow: var(--shadow2); padding: 1.1rem;
  border: 1px solid var(--border); margin-bottom: .8rem;
}

/* ── FORM ── */
.form-group { margin-bottom: .85rem; }
.form-label {
  font-size: .75rem; font-weight: 700; color: var(--sky3);
  letter-spacing: .08em; margin-bottom: .35rem; display: block;
}
.form-input, .form-select {
  width: 100%; border: 2px solid var(--border); border-radius: var(--radius-sm);
  padding: .6rem .85rem; font-family: var(--font); font-size: .95rem;
  background: var(--paper); color: var(--ink); font-weight: 500;
  transition: border-color .15s, box-shadow .15s;
  -webkit-appearance: none; appearance: none;
}
.form-input:focus, .form-select:focus {
  outline: none; border-color: var(--sky);
  box-shadow: 0 0 0 3px rgba(56,182,232,.18);
  background: var(--white);
}
.form-input::placeholder { color: #b0cfe0; font-weight: 400; }

/* 大科目・中科目グリッド */
.cat-grid {
  display: grid; grid-template-columns: repeat(3,1fr); gap: .45rem;
  margin-bottom: .4rem;
}
.cat-chip {
  padding: .5rem .3rem; border-radius: 10px; border: 2px solid var(--border);
  text-align: center; font-size: .82rem; font-weight: 700; cursor: pointer;
  background: var(--paper); color: var(--muted); transition: all .15s;
  font-family: var(--font); line-height: 1.2;
}
.cat-chip.selected {
  background: linear-gradient(135deg, var(--sky), var(--sky2));
  color: #fff; border-color: var(--sky2);
  box-shadow: 0 2px 8px rgba(56,182,232,.35);
}
.cat-chip.sub { font-size: .78rem; }

/* 支払者・決済 */
.payer-grid {
  display: grid; grid-template-columns: repeat(3,1fr); gap: .5rem;
}
.payer-chip {
  padding: .6rem .3rem; border-radius: 10px; border: 2px solid var(--border);
  text-align: center; font-size: .9rem; font-weight: 800; cursor: pointer;
  background: var(--paper); color: var(--muted); transition: all .15s;
  font-family: var(--font);
}
.payer-chip.selected-dai    { background: linear-gradient(135deg,#38b6e8,#1a9fd4); color:#fff; border-color:#1a9fd4; box-shadow:0 2px 8px rgba(56,182,232,.35); }
.payer-chip.selected-yoko   { background: linear-gradient(135deg,#ff6b9d,#e04494); color:#fff; border-color:#e04494; box-shadow:0 2px 8px rgba(255,107,157,.35); }
.payer-chip.selected-kouhi  { background: linear-gradient(135deg,#2ed8a8,#1ab890); color:#fff; border-color:#1ab890; box-shadow:0 2px 8px rgba(46,216,168,.35); }

.pay-grid {
  display: grid; grid-template-columns: repeat(3,1fr); gap: .5rem; margin-bottom: .5rem;
}
.pay-chip {
  padding: .55rem .3rem; border-radius: 10px; border: 2px solid var(--border);
  text-align: center; font-size: .82rem; font-weight: 700; cursor: pointer;
  background: var(--paper); color: var(--muted); transition: all .15s;
  font-family: var(--font);
}
.pay-chip.selected { background: linear-gradient(135deg,#ffb347,#ff8c00); color:#fff; border-color:#ff8c00; box-shadow:0 2px 8px rgba(255,179,71,.35); }

/* 決済詳細候補 */
.detail-chips {
  display: flex; flex-wrap: wrap; gap: .38rem; margin-top: .45rem;
}
.detail-chip {
  padding: .3rem .7rem; border-radius: 20px; border: 1.5px solid var(--border);
  font-size: .8rem; font-weight: 600; cursor: pointer;
  background: var(--paper); color: var(--muted); transition: all .15s;
  font-family: var(--font);
}
.detail-chip.selected {
  background: var(--sky-lt); color: var(--sky2); border-color: var(--sky);
}

/* 候補編集ボタン */
.edit-master-btn {
  font-size: .75rem; color: var(--muted); background: none; border: none;
  cursor: pointer; text-decoration: underline; font-family: var(--font);
  margin-top: .3rem; display: inline-block;
}

/* 金額入力 */
.amount-wrap {
  position: relative;
}
.amount-wrap .currency {
  position: absolute; left: .85rem; top: 50%; transform: translateY(-50%);
  font-size: 1rem; font-weight: 700; color: var(--sky2);
}
.amount-input {
  padding-left: 2rem !important; font-size: 1.3rem !important; font-weight: 800 !important;
  text-align: right;
}

/* 送信ボタン */
.submit-btn {
  width: 100%; padding: .85rem; border: none; border-radius: var(--radius);
  background: linear-gradient(135deg, var(--sky) 0%, var(--sky2) 60%, #1abbcc 100%);
  color: #fff; font-family: var(--font); font-size: 1rem; font-weight: 800;
  cursor: pointer; letter-spacing: .06em;
  box-shadow: 0 4px 16px rgba(56,182,232,.4);
  transition: all .15s; margin-top: .5rem;
}
.submit-btn:active { transform: translateY(1px); box-shadow: 0 2px 8px rgba(56,182,232,.3); }
.submit-btn:disabled { opacity: .6; cursor: not-allowed; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--ink); color: #fff; padding: .65rem 1.4rem;
  border-radius: 25px; font-size: .88rem; font-weight: 600;
  opacity: 0; transition: all .3s; pointer-events: none; z-index: 999;
  white-space: nowrap; box-shadow: 0 4px 16px rgba(0,0,0,.2);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { background: linear-gradient(135deg, var(--mint), #1ab890); }
.toast.error   { background: linear-gradient(135deg, var(--coral), #e04040); }

/* ── 集計ページ ── */
.summary-month-sel {
  display: flex; gap: .4rem; flex-wrap: wrap; margin-bottom: .8rem;
}
.m-btn {
  padding: .35rem .65rem; border-radius: 20px; border: 1.5px solid var(--border);
  font-size: .8rem; font-weight: 700; cursor: pointer; background: var(--paper);
  color: var(--muted); font-family: var(--font); transition: all .15s;
}
.m-btn.active { background: var(--sky); color: #fff; border-color: var(--sky); }

.summary-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: .7rem; margin-bottom: .8rem;
}
.stat-card {
  background: var(--white); border-radius: var(--radius-sm);
  border: 1px solid var(--border); padding: .8rem 1rem;
  box-shadow: var(--shadow2);
}
.stat-label { font-size: .72rem; font-weight: 700; color: var(--muted); margin-bottom: .2rem; }
.stat-value { font-size: 1.25rem; font-weight: 800; color: var(--ink); }
.stat-value.dai  { color: var(--sky2); }
.stat-value.yoko { color: #e04494; }

.cat-summary-row {
  display: flex; align-items: center; padding: .55rem .7rem;
  border-bottom: 1px solid var(--border);
}
.cat-summary-row:last-child { border-bottom: none; }
.cat-bar-wrap { flex: 1; margin: 0 .7rem; }
.cat-bar-bg { background: var(--sky-lt); border-radius: 4px; height: 7px; overflow: hidden; }
.cat-bar-fill { background: linear-gradient(90deg, var(--sky), var(--mint)); height: 100%; border-radius: 4px; transition: width .5s ease; }
.cat-label { font-size: .82rem; font-weight: 700; color: var(--ink); min-width: 80px; }
.cat-amount { font-size: .85rem; font-weight: 700; color: var(--sky2); min-width: 72px; text-align: right; }

/* 支払者別グラフ */
.payer-bars { display: flex; flex-direction: column; gap: .5rem; }
.payer-bar-row { display: flex; align-items: center; gap: .6rem; }
.payer-name { font-size: .82rem; font-weight: 700; min-width: 40px; }
.payer-bar-bg { flex: 1; background: var(--sky-lt); border-radius: 4px; height: 14px; overflow: hidden; }
.payer-bar-fill { height: 100%; border-radius: 4px; transition: width .5s; }
.payer-fill-dai  { background: linear-gradient(90deg, var(--sky), var(--sky2)); }
.payer-fill-yoko { background: linear-gradient(90deg, #ff6b9d, #e04494); }
.payer-fill-kouhi{ background: linear-gradient(90deg, var(--mint), #1ab890); }
.payer-amnt { font-size: .82rem; font-weight: 700; min-width: 70px; text-align: right; }

/* ── 履歴ページ ── */
.history-filter {
  display: flex; gap: .4rem; flex-wrap: wrap; margin-bottom: .7rem;
}
.filter-btn {
  padding: .3rem .7rem; border-radius: 20px; border: 1.5px solid var(--border);
  font-size: .8rem; font-weight: 700; cursor: pointer;
  background: var(--paper); color: var(--muted); font-family: var(--font); transition: all .15s;
}
.filter-btn.active { background: var(--sky); color: #fff; border-color: var(--sky); }

.entry-card {
  background: var(--white); border-radius: var(--radius-sm);
  border: 1px solid var(--border); padding: .75rem .9rem;
  margin-bottom: .5rem; display: flex; align-items: center; gap: .7rem;
  box-shadow: 0 1px 6px rgba(56,182,232,.07);
  transition: box-shadow .15s;
}
.entry-card:active { box-shadow: 0 3px 12px rgba(56,182,232,.18); }
.entry-cat-badge {
  width: 42px; height: 42px; border-radius: 12px; display: flex;
  align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0;
}
.entry-info { flex: 1; min-width: 0; }
.entry-main { display: flex; justify-content: space-between; align-items: baseline; }
.entry-cat-label { font-size: .88rem; font-weight: 700; color: var(--ink); }
.entry-amount { font-size: 1rem; font-weight: 800; color: var(--sky2); }
.entry-sub {
  font-size: .75rem; color: var(--muted); margin-top: .12rem;
  display: flex; gap: .5rem; flex-wrap: wrap; align-items: center;
}
.payer-badge {
  padding: .1rem .5rem; border-radius: 10px; font-size: .7rem; font-weight: 700;
}
.payer-badge.大   { background: #e0f5fd; color: var(--sky2); }
.payer-badge.洋子 { background: #ffe0f0; color: #e04494; }
.payer-badge.公費 { background: #e0fdf4; color: #1ab890; }
.del-btn {
  background: none; border: none; color: #ccd8e0; font-size: 1.1rem;
  cursor: pointer; padding: .2rem; border-radius: 6px; transition: color .15s;
  flex-shrink: 0;
}
.del-btn:active { color: var(--coral); }

.empty-msg {
  text-align: center; color: var(--muted); padding: 2.5rem 1rem;
  font-size: .92rem; font-weight: 600;
}
.empty-msg .empty-icon { font-size: 2.5rem; margin-bottom: .5rem; }

/* ── 設定ページ ── */
.setting-item {
  background: var(--white); border-radius: var(--radius-sm);
  border: 1px solid var(--border); padding: .9rem 1rem;
  margin-bottom: .6rem; box-shadow: var(--shadow2);
}
.setting-title { font-size: .85rem; font-weight: 800; color: var(--ink); margin-bottom: .5rem; }
.tag-edit-wrap { display: flex; flex-wrap: wrap; gap: .35rem; }
.tag-item {
  display: flex; align-items: center; background: var(--sky-lt);
  border: 1.5px solid var(--border); border-radius: 20px;
  padding: .22rem .6rem; font-size: .82rem; font-weight: 600; color: var(--sky2);
}
.tag-del-btn {
  background: none; border: none; color: var(--muted); cursor: pointer;
  margin-left: .3rem; font-size: .85rem; line-height: 1; padding: 0;
}
.tag-del-btn:hover { color: var(--coral); }
.tag-add-row { display: flex; gap: .4rem; margin-top: .5rem; }
.tag-add-input {
  flex: 1; border: 2px solid var(--border); border-radius: 8px;
  padding: .4rem .7rem; font-family: var(--font); font-size: .85rem;
  background: var(--paper); color: var(--ink);
}
.tag-add-input:focus { outline: none; border-color: var(--sky); }
.tag-add-btn {
  padding: .4rem .8rem; background: var(--sky); color: #fff; border: none;
  border-radius: 8px; font-family: var(--font); font-size: .85rem; font-weight: 700;
  cursor: pointer;
}

/* ── カスタムカレンダー ── */
.cal-wrap { position: relative; }
.cal-popup {
  position: absolute; top: calc(100% + 6px); left: 0; z-index: 200;
  background: var(--white); border: 2px solid var(--border);
  border-radius: var(--radius); box-shadow: 0 8px 30px rgba(56,182,232,.2);
  padding: .6rem; width: 280px;
}
.cal-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: .5rem; }
.cal-nav {
  background: var(--sky-lt); border: none; color: var(--sky2); font-size: 1rem;
  border-radius: 8px; padding: .2rem .5rem; cursor: pointer; font-weight: 800;
}
.cal-title { font-size: .9rem; font-weight: 800; color: var(--ink); }
.cal-today-btn {
  font-size: .72rem; padding: .18rem .5rem; border: 1.5px solid var(--sky);
  background: var(--sky-lt); color: var(--sky2); border-radius: 6px;
  cursor: pointer; font-weight: 700; font-family: var(--font);
}
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
.cal-wday { text-align: center; font-size: .72rem; font-weight: 700; color: var(--muted); padding: .15rem 0; }
.cal-wday.sun { color: var(--coral); } .cal-wday.sat { color: var(--sky2); }
.cal-day {
  text-align: center; padding: .32rem .15rem; border-radius: 8px;
  font-size: .82rem; font-weight: 600; cursor: pointer; transition: all .1s;
  color: var(--ink);
}
.cal-day:hover { background: var(--sky-lt); }
.cal-day.cal-today { background: var(--sky-lt); color: var(--sky2); font-weight: 800; }
.cal-day.cal-sel { background: var(--sky); color: #fff; font-weight: 800; }

/* ── ローディング ── */
.loading-overlay {
  position: fixed; inset: 0; background: rgba(240,250,255,.85);
  display: flex; align-items: center; justify-content: center;
  z-index: 999; display: none;
}
.loading-spinner {
  width: 44px; height: 44px; border: 4px solid var(--sky-lt);
  border-top-color: var(--sky); border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- ローディング -->
<div class="loading-overlay" id="loading"><div class="loading-spinner"></div></div>

<!-- ヘッダー -->
<header class="app-header">
  <div class="app-title"><span class="icon">🏠</span>Family Budget</div>
  <div class="header-right">
    <select class="year-sel" id="yearSel" onchange="changeYear(this.value)">
      <option value="2025">2025年度</option>
      <option value="2026">2026年度</option>
      <option value="2027">2027年度</option>
    </select>
    <button class="reload-btn" onclick="loadData()">🔄</button>
  </div>
</header>

<!-- タブ -->
<nav class="tab-nav">
  <div class="tab-btn active" onclick="showTab('entry')" id="tab-entry">
    <span class="tab-icon">✏️</span>記録
  </div>
  <div class="tab-btn" onclick="showTab('summary')" id="tab-summary">
    <span class="tab-icon">📊</span>集計
  </div>
  <div class="tab-btn" onclick="showTab('history')" id="tab-history">
    <span class="tab-icon">📋</span>履歴
  </div>
  <div class="tab-btn" onclick="showTab('settings')" id="tab-settings">
    <span class="tab-icon">⚙️</span>設定
  </div>
</nav>

<!-- 記録ページ -->
<div class="page active" id="page-entry">

  <div class="sec-title">支出を記録</div>
  <div class="card">

    <!-- 日付 -->
    <div class="form-group">
      <label class="form-label">📅 日付</label>
      <div class="cal-wrap">
        <input type="text" class="form-input" id="e-date" readonly
               onclick="toggleCal('e-cal','e-date')" placeholder="日付を選択" style="cursor:pointer">
        <div class="cal-popup" id="e-cal" style="display:none"></div>
      </div>
    </div>

    <!-- 大科目 -->
    <div class="form-group">
      <label class="form-label">📂 大科目</label>
      <div class="cat-grid" id="major-grid"></div>
    </div>

    <!-- 中科目 -->
    <div class="form-group" id="minor-wrap" style="display:none">
      <label class="form-label">📌 中科目</label>
      <div class="cat-grid" id="minor-grid"></div>
    </div>

    <!-- 支払者 -->
    <div class="form-group">
      <label class="form-label">👤 支払者</label>
      <div class="payer-grid" id="payer-grid">
        <div class="payer-chip" onclick="selPayer('大')">大</div>
        <div class="payer-chip" onclick="selPayer('洋子')">洋子</div>
        <div class="payer-chip" onclick="selPayer('公費')">公費</div>
      </div>
    </div>

    <!-- 決済種別 -->
    <div class="form-group">
      <label class="form-label">💳 決済種別</label>
      <div class="pay-grid" id="pay-grid">
        <div class="pay-chip" onclick="selPay('カード')">💳 カード</div>
        <div class="pay-chip" onclick="selPay('QR')">📱 QR</div>
        <div class="pay-chip" onclick="selPay('現金')">💴 現金</div>
      </div>
      <!-- 決済詳細 -->
      <div id="detail-wrap" style="display:none">
        <div class="detail-chips" id="detail-chips"></div>
        <input type="text" class="form-input" id="detail-input" placeholder="または直接入力…"
               style="margin-top:.5rem;font-size:.9rem;" oninput="onDetailInput(this.value)">
      </div>
    </div>

    <!-- 金額 -->
    <div class="form-group">
      <label class="form-label">💰 金額</label>
      <div class="amount-wrap">
        <span class="currency">¥</span>
        <input type="number" class="form-input amount-input" id="e-amount"
               placeholder="0" min="0" inputmode="numeric">
      </div>
    </div>

    <!-- メモ -->
    <div class="form-group">

        <button class="edit-master-btn" onclick="showTab('settings');setTimeout(()=>document.getElementById('memo-setting').scrollIntoView({behavior:'smooth'}),200)">候補を編集</button>

  <div id="history-list"></div>

<div class="page" id="page-settings">
  <div class="sec-title">候補の管理</div>

  <div class="setting-item">
    <div class="setting-title">💳 カード詳細</div>
    <div class="tag-edit-wrap" id="card-tags"></div>
    <div class="tag-add-row">
      <input class="tag-add-input" id="card-add-input" placeholder="例：住信SBIcard">
      <button class="tag-add-btn" onclick="addTag('card')">追加</button>

      <input class="tag-add-input" id="qr-add-input" placeholder="例：iD">
      <button class="tag-add-btn" onclick="addTag('qr')">追加</button>

  </div>

  <div class="setting-item" id="memo-setting">
    <div class="setting-title">📝 メモ候補</div>
    <div class="tag-edit-wrap" id="memo-tags"></div>
    <div class="tag-add-row">
      <input class="tag-add-input" id="memo-add-input" placeholder="例：スーパー">
      <button class="tag-add-btn" onclick="addTag('memo')">追加</button>
    </div>
  </div>

  <div class="setting-item">
    <div class="setting-title">📂 カテゴリ管理（中科目の追加・削除）</div>
    <div id="cat-manage-list"></div>
  </div>
</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════
const GAS_URL    = 'https://script.google.com/macros/s/AKfycbwx0cgLdRLQLUItKYmGlBLkavkYF2vwQdKVW1lvgF-Q_MDENaTkuBTe65OO6I0alh9eWw/exec';
const ACCESS_KEY = 'kazoku2026secure';

// ══════════════════════════════════════════
// カテゴリ定義（大科目→中科目）
// ══════════════════════════════════════════
const DEFAULT_CATS = {
  '住居費':   ['マンション管理費','固定資産税','その他'],
  '光熱水費': ['電気代','ガス代','水道代'],
  '食費':     ['食料品','酒類','外食','カフェ'],
  '日用品費': ['日用品'],
  '通信費':   ['携帯電話','ネット回線','NHK受信料'],
  'サブスク費':['Spotify','YouTube'],
  '交際費':   ['飲み会','プレゼント','冠婚葬祭','会費'],
  'その他':   ['その他'],
};

const DEFAULT_CARDS = ['楽天card','住信SBIcard','イオンcard','三井住友card'];
const DEFAULT_MEMOS = ['スーパー','コンビニ','ドラッグストア','外食','ネット通販'];
const DEFAULT_QR    = ['楽天Pay','iD','PayPay','Suica'];

// カテゴリアイコン
const CAT_ICONS = {
  '住居費':'🏠','光熱水費':'💡','食費':'🍱','日用品費':'🛒',
  '通信費':'📡','サブスク費':'🎵','交際費':'🥂','その他':'📦',
};

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
// 本日の日付から年度を自動判定（4/21〜翌4/20）
function calcCurrentFY() {
  const now = new Date(new Date().getTime() + 9*60*60*1000); // JST
  const y = now.getFullYear(), m = now.getMonth()+1, d = now.getDate();
  const adjM = d <= 20 ? m - 1 || 12 : m;
  const adjY = d <= 20 && m === 1 ? y - 1 : y;
  return (adjM >= 4 ? adjY : adjY - 1);
}
let FY = calcCurrentFY();
let _cache  = [];
let _loaded = false;
let _submitting = false;

let _cats  = JSON.parse(localStorage.getItem('kz_cats')  || 'null') || JSON.parse(JSON.stringify(DEFAULT_CATS));
let _memos = JSON.parse(localStorage.getItem('kz_memos') || 'null') || [...DEFAULT_MEMOS];
let _cards = JSON.parse(localStorage.getItem('kz_cards') || 'null') || [...DEFAULT_CARDS];
let _qrs   = JSON.parse(localStorage.getItem('kz_qrs')   || 'null') || [...DEFAULT_QR];

// フォーム状態
let selMajor = '', selMinor = '', _selPayer = '', _selPay = '', selDetail = '';

// 履歴フィルター
let histFilter = '';

// 集計月
let sumMonth = -1; // -1=全月

// ══════════════════════════════════════════
// GAS通信
// ══════════════════════════════════════════
async function gasFetch() {
  const url = `${GAS_URL}?key=${ACCESS_KEY}`;
  const res = await fetch(url);
  return await res.json();
}

async function gasPost(body) {
  const payload = encodeURIComponent(JSON.stringify(body));
  const url = `${GAS_URL}?key=${ACCESS_KEY}&payload=${payload}`;
  const res = await fetch(url);
  return await res.json();
}

// ══════════════════════════════════════════
// データ読み込み
// ══════════════════════════════════════════
async function loadData(silent=false) {
  if (!silent) showToast('読み込み中…');
  try {
    const res = await gasFetch();
    _cache = (res.rows || []).map(rowToEntry).filter(Boolean);
    _loaded = true;
    if (!silent) showToast('読み込み完了', 'success');
    renderAll();
  } catch(e) {
    showToast('読み込みエラー', 'error');
  }
}

function rowToEntry(row) {
  if (!row[0]) return null;
  return {
    id:      String(row[0]),
    date:    String(row[1] || ''),
    major:   String(row[2] || ''),
    minor:   String(row[3] || ''),
    payer:   String(row[4] || ''),
    payType: String(row[5] || ''),
    payDetail:String(row[6]|| ''),
    amount:  parseFloat(row[7]) || 0,
    memo:    String(row[8] || ''),
  };
}

// ══════════════════════════════════════════
// 年度判定（4/21〜翌4/20）
// ══════════════════════════════════════════
function getFY(dateStr) {
  const d = new Date(dateStr);
  let m = d.getMonth() + 1, day = d.getDate(), y = d.getFullYear();
  if (day <= 20) { m -= 1; if (m === 0) { m = 12; y -= 1; } }
  return m >= 4 ? y : y - 1;
}
function getFMI(dateStr) {
  const d = new Date(dateStr);
  let m = d.getMonth() + 1, day = d.getDate(), y = d.getFullYear();
  if (day <= 20) { m -= 1; if (m === 0) { m = 12; y -= 1; } }
  return m >= 4 ? m - 4 : m + 8;
}
function isFY(e) { return getFY(e.date) === FY; }
function fmtAmt(n) { return '¥' + n.toLocaleString('ja-JP'); }

// ══════════════════════════════════════════
// 初期化
// ══════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  // 年度セレクタをFYに合わせる
  const ys = document.getElementById('yearSel');
  if (ys) ys.value = String(FY);
  initCatGrid();
  renderMemoChips();
  initDates();
  buildSettingsPage();
  loadData();
  document.addEventListener('click', e => {
    if (!e.target.closest('.cal-wrap')) closeAllCals();
  });
});

function changeYear(y) {
  FY = parseInt(y);
  renderAll();
}

function renderAll() {
  renderSummary();
  renderHistory();
}

// ══════════════════════════════════════════
// カテゴリグリッド初期化
// ══════════════════════════════════════════
function initCatGrid() {
  const grid = document.getElementById('major-grid');
  grid.innerHTML = Object.keys(_cats).map(m =>
    `<div class="cat-chip" onclick="selMajorFn('${m}')">${CAT_ICONS[m]||'📁'} ${m}</div>`
  ).join('');
}

function selMajorFn(m) {
  selMajor = m; selMinor = '';
  document.querySelectorAll('#major-grid .cat-chip').forEach(c =>
    c.classList.toggle('selected', c.textContent.trim().includes(m))
  );
  // 中科目更新
  const subs = _cats[m] || [];
  const wrap = document.getElementById('minor-wrap');
  const grid = document.getElementById('minor-grid');
  if (subs.length > 0) {
    grid.innerHTML = subs.map(s =>
      `<div class="cat-chip sub" onclick="selMinorFn('${s}')">${s}</div>`
    ).join('');
    wrap.style.display = 'block';
  } else {
    wrap.style.display = 'none';
  }
}

function selMinorFn(s) {
  selMinor = s;
  document.querySelectorAll('#minor-grid .cat-chip').forEach(c =>
    c.classList.toggle('selected', c.textContent.trim() === s)
  );
}

// ══════════════════════════════════════════
// 支払者・決済
// ══════════════════════════════════════════
function selPayer(p) {
  _selPayer = p;
  const map = {大:'selected-dai', 洋子:'selected-yoko', 公費:'selected-kouhi'};
  document.querySelectorAll('#payer-grid .payer-chip').forEach(c => {
    c.className = 'payer-chip';
    if (c.textContent.trim() === p) c.classList.add(map[p]);
  });
}

function selPay(t) {
  _selPay = t; selDetail = '';
  document.querySelectorAll('#pay-grid .pay-chip').forEach(c =>
    c.classList.toggle('selected', c.textContent.includes(t === 'カード' ? 'カード' : t === 'QR' ? 'QR' : '現金'))
  );
  const wrap = document.getElementById('detail-wrap');
  const chips = document.getElementById('detail-chips');
  const inp = document.getElementById('detail-input');
  if (t === 'カード' || t === 'QR') {
    const list = t === 'カード' ? _cards : _qrs;
    chips.innerHTML = list.map(d =>
      `<div class="detail-chip" onclick="selDetailFn('${d}')">${d}</div>`
    ).join('');
    inp.value = '';
    wrap.style.display = 'block';
  } else {
    wrap.style.display = 'none';
  }
}

function selDetailFn(d) {
  selDetail = d;
  document.getElementById('detail-input').value = d;
  document.querySelectorAll('.detail-chip').forEach(c =>
    c.classList.toggle('selected', c.textContent === d)
  );
}

function onDetailInput(v) {
  selDetail = v;
  document.querySelectorAll('.detail-chip').forEach(c => c.classList.remove('selected'));
}

// ══════════════════════════════════════════
// 送信
// ══════════════════════════════════════════
async function submitEntry() {
  if (_submitting) return;
  const date   = document.getElementById('e-date').value;
  const amount = parseFloat(document.getElementById('e-amount').value);
  const memo   = document.getElementById('e-memo').value.trim();

  if (!date)      { showToast('日付を選択してください', 'error'); return; }
  if (!selMajor)  { showToast('大科目を選択してください', 'error'); return; }
  if (!_selPayer)  { showToast('支払者を選択してください', 'error'); return; }
  if (!_selPay)    { showToast('決済種別を選択してください', 'error'); return; }
  if (!amount || amount <= 0) { showToast('金額を入力してください', 'error'); return; }

  _submitting = true;
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;

  const id = Date.now();
  const now = new Date();
  const jst = new Date(now.getTime() + 9*60*60*1000);
  const ts  = jst.toISOString().replace('T',' ').slice(0,19);

  const row = [id, date, selMajor, selMinor, _selPayer, _selPay, selDetail, amount, memo, ts];
  try {
    const res = await gasPost({action:'append', row});
    if (res.status === 'ok') {
      const entry = rowToEntry(row);
      _cache.push(entry);
      showToast('✓ 記録しました！', 'success');
      resetForm();
      renderAll();
    } else {
      showToast('エラー: ' + (res.message||''), 'error');
    }
  } catch(e) {
    showToast('通信エラー', 'error');
  }
  _submitting = false;
  btn.disabled = false;
}

function resetForm() {
  selMajor = ''; selMinor = ''; selPayer = ''; selPay = ''; selDetail = '';
  document.querySelectorAll('.cat-chip, .payer-chip, .pay-chip, .detail-chip')
    .forEach(c => c.className = c.className.replace(/\s*(selected[\w-]*)/g, ''));
  document.getElementById('minor-wrap').style.display = 'none';
  document.getElementById('detail-wrap').style.display = 'none';
  document.getElementById('e-amount').value = '';
  document.getElementById('e-memo').value = '';
  document.getElementById('e-date').value = today();
}

// ══════════════════════════════════════════
// 集計
// ══════════════════════════════════════════
const MONTHS_JP = ['４月','５月','６月','７月','８月','９月','１０月','１１月','１２月','１月','２月','３月'];

function renderSummary() {
  const data = _cache.filter(e => isFY(e));

  // 月選択ボタン
  const msel = document.getElementById('month-sel');
  msel.innerHTML = `<div class="m-btn ${sumMonth===-1?'active':''}" onclick="setSumMonth(-1)">全期間</div>` +
    MONTHS_JP.map((m,i) =>
      `<div class="m-btn ${sumMonth===i?'active':''}" onclick="setSumMonth(${i})">${m}</div>`
    ).join('');

  const filtered = sumMonth === -1 ? data : data.filter(e => getFMI(e.date) === sumMonth);

  const total = filtered.reduce((a,e) => a + e.amount, 0);
  const dai   = filtered.filter(e => e.payer === '大').reduce((a,e)=>a+e.amount,0);
  const yoko  = filtered.filter(e => e.payer === '洋子').reduce((a,e)=>a+e.amount,0);
  const kouhi = filtered.filter(e => e.payer === '公費').reduce((a,e)=>a+e.amount,0);

  document.getElementById('stat-cards').innerHTML = `
    <div class="stat-card"><div class="stat-label">合計支出</div><div class="stat-value">${fmtAmt(total)}</div></div>
    <div class="stat-card"><div class="stat-label">件数</div><div class="stat-value">${filtered.length}件</div></div>
    <div class="stat-card"><div class="stat-label">大</div><div class="stat-value dai">${fmtAmt(dai)}</div></div>
    <div class="stat-card"><div class="stat-label">洋子</div><div class="stat-value yoko">${fmtAmt(yoko)}</div></div>
  `;

  // カテゴリ別
  const byMajor = {};
  filtered.forEach(e => { byMajor[e.major] = (byMajor[e.major]||0) + e.amount; });
  const sorted = Object.entries(byMajor).sort((a,b)=>b[1]-a[1]);
  const max = sorted[0]?.[1] || 1;
  document.getElementById('cat-summary-list').innerHTML = sorted.length ? sorted.map(([k,v]) =>
    `<div class="cat-summary-row">
      <span class="cat-label">${CAT_ICONS[k]||'📁'} ${k}</span>
      <div class="cat-bar-wrap"><div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${v/max*100}%"></div></div></div>
      <span class="cat-amount">${fmtAmt(v)}</span>
    </div>`
  ).join('') : '<div class="empty-msg">データなし</div>';

  // 支払者別
  const pmax = Math.max(dai, yoko, kouhi, 1);
  document.getElementById('payer-bars').innerHTML = `
    <div class="payer-bar-row"><span class="payer-name">大</span><div class="payer-bar-bg"><div class="payer-bar-fill payer-fill-dai" style="width:${dai/pmax*100}%"></div></div><span class="payer-amnt">${fmtAmt(dai)}</span></div>
    <div class="payer-bar-row"><span class="payer-name">洋子</span><div class="payer-bar-bg"><div class="payer-bar-fill payer-fill-yoko" style="width:${yoko/pmax*100}%"></div></div><span class="payer-amnt">${fmtAmt(yoko)}</span></div>
    <div class="payer-bar-row"><span class="payer-name">公費</span><div class="payer-bar-bg"><div class="payer-bar-fill payer-fill-kouhi" style="width:${kouhi/pmax*100}%"></div></div><span class="payer-amnt">${fmtAmt(kouhi)}</span></div>
  `;
}

function setSumMonth(i) {
  sumMonth = i;
  renderSummary();
}

// ══════════════════════════════════════════
// 履歴
// ══════════════════════════════════════════
function renderHistory() {
  const data = _cache.filter(e => isFY(e))
    .filter(e => !histFilter || e.payer === histFilter)
    .sort((a,b) => b.date.localeCompare(a.date));

  const list = document.getElementById('history-list');
  if (!data.length) {
    list.innerHTML = '<div class="empty-msg"><div class="empty-icon">📭</div>記録がありません</div>';
    return;
  }
  list.innerHTML = data.map(e => `
    <div class="entry-card">
      <div class="entry-cat-badge" style="background:${catBg(e.major)}">${CAT_ICONS[e.major]||'📁'}</div>
      <div class="entry-info">
        <div class="entry-main">
          <span class="entry-cat-label">${e.major}${e.minor?' › '+e.minor:''}</span>
          <span class="entry-amount">${fmtAmt(e.amount)}</span>
        </div>
        <div class="entry-sub">
          <span class="payer-badge ${e.payer}">${e.payer}</span>
          <span>${e.date}</span>
          <span>${e.payType}${e.payDetail?' · '+e.payDetail:''}</span>
          ${e.memo ? `<span>${e.memo}</span>` : ''}
        </div>
      </div>
      <button class="del-btn" onclick="delEntry('${e.id}')">🗑</button>
    </div>
  `).join('');
}

function catBg(m) {
  const map = {
    '住居費':'#dff0ff','光熱水費':'#fff8d4','食費':'#e8fdf0',
    '日用品費':'#f0e8ff','通信費':'#e0f8ff','サブスク費':'#ffe8f8',
    '交際費':'#fff0e8','その他':'#f0f0f0',
  };
  return map[m] || '#f0f8ff';
}

function filterHistory(f) {
  histFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.filter === f)
  );
  renderHistory();
}

async function delEntry(id) {
  if (!confirm('この記録を削除しますか？')) return;
  try {
    const res = await gasPost({action:'delete', id});
    if (res.status === 'ok') {
      _cache = _cache.filter(e => e.id !== id);
      showToast('削除しました', 'success');
      renderAll();
    } else {
      showToast('削除エラー', 'error');
    }
  } catch(e) {
    showToast('通信エラー', 'error');
  }
}

// ══════════════════════════════════════════
// 設定ページ
// ══════════════════════════════════════════
function savePrefs() {
  localStorage.setItem('kz_cats',  JSON.stringify(_cats));
  localStorage.setItem('kz_cards', JSON.stringify(_cards));
  localStorage.setItem('kz_qrs',   JSON.stringify(_qrs));
  localStorage.setItem('kz_memos', JSON.stringify(_memos));
}

function buildSettingsPage() {
  renderTagList('card-tags', _cards, 'card');
  renderTagList('qr-tags',   _qrs,   'qr');
  renderTagList('memo-tags', _memos, 'memo');
  renderCatManage();
}

function renderTagList(elId, list, type) {
  document.getElementById(elId).innerHTML = list.map((t,i) =>
    `<div class="tag-item">${t}<button class="tag-del-btn" onclick="delTag('${type}',${i})">✕</button></div>`
  ).join('');
}

function addTag(type) {
  const inp = document.getElementById(type+'-add-input');
  const val = inp.value.trim();
  if (!val) return;
  if (type === 'card') _cards.push(val);
  else if (type === 'qr') _qrs.push(val);
  else if (type === 'memo') _memos.push(val);
  inp.value = '';
  savePrefs();
  buildSettingsPage();
  showToast('追加しました', 'success');
}

function delTag(type, i) {
  if (type === 'card') _cards.splice(i, 1);
  else if (type === 'qr') _qrs.splice(i, 1);
  else if (type === 'memo') _memos.splice(i, 1);
  savePrefs();
  buildSettingsPage();
}

function renderCatManage() {
  const el = document.getElementById('cat-manage-list');
  el.innerHTML = Object.entries(_cats).map(([major, subs]) =>
    `<div style="margin-bottom:.8rem">
      <div style="font-size:.82rem;font-weight:800;color:var(--sky2);margin-bottom:.35rem">${CAT_ICONS[major]||'📁'} ${major}</div>
      <div class="tag-edit-wrap" style="margin-bottom:.35rem">
        ${subs.map((s,i) =>
          `<div class="tag-item">${s}<button class="tag-del-btn" onclick="delSub('${major}',${i})">✕</button></div>`
        ).join('')}
      </div>
      <div class="tag-add-row">
        <input class="tag-add-input" id="sub-add-${major}" placeholder="中科目を追加">
        <button class="tag-add-btn" onclick="addSub('${major}')">追加</button>
      </div>
    </div>`
  ).join('');
}

function addSub(major) {
  const inp = document.getElementById('sub-add-'+major);
  const val = inp.value.trim();
  if (!val) return;
  _cats[major].push(val);
  inp.value = '';
  savePrefs();
  renderCatManage();
  initCatGrid();
  showToast('追加しました', 'success');
}

function delSub(major, i) {
  _cats[major].splice(i, 1);
  savePrefs();
  renderCatManage();
  initCatGrid();
}

// タブ切り替え
// ══════════════════════════════════════════
function renderMemoChips() {
  const el = document.getElementById('memo-chips');
  if (!el) return;
  el.innerHTML = _memos.map(m =>
    `<div class="detail-chip" onclick="selMemoFn('${m}')">${m}</div>`
  ).join('');
}

function selMemoFn(m) {
  document.getElementById('e-memo').value = m;
  document.querySelectorAll('#memo-chips .detail-chip').forEach(c =>
    c.classList.toggle('selected', c.textContent === m)
  );
}

function onMemoInput(v) {
  document.querySelectorAll('#memo-chips .detail-chip').forEach(c => c.classList.remove('selected'));
}

function showTab(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if (name === 'summary') renderSummary();
  if (name === 'history') renderHistory();
  if (name === 'settings') buildSettingsPage();
}

// ══════════════════════════════════════════
// カスタムカレンダー
// ══════════════════════════════════════════
const WDAYS = ['日','月','火','水','木','金','土'];
const today = () => {
  const d = new Date();
  const jst = new Date(d.getTime() + 9*60*60*1000);
  return jst.toISOString().slice(0,10);
};

function initDates() {
  document.getElementById('e-date').value = today();
  renderCal('e-cal', 'e-date');
}

function toggleCal(calId, hiddenId) {
  const cal = document.getElementById(calId);
  const isOpen = cal.style.display !== 'none';
  closeAllCals();
  if (!isOpen) {
    renderCal(calId, hiddenId);
    cal.style.display = 'block';
  }
}

function closeAllCals() {
  document.querySelectorAll('.cal-popup').forEach(c => c.style.display = 'none');
}

function renderCal(calId, hiddenId) {
  const hidden = document.getElementById(hiddenId);
  const sel = hidden.value || today();
  const [vy, vm] = sel.split('-').map(Number);
  _calState = _calState || {};
  if (!_calState[calId]) _calState[calId] = {y:vy, m:vm};
  const {y, m} = _calState[calId];
  const td = today();
  const firstDay = new Date(y, m-1, 1).getDay();
  const daysInM  = new Date(y, m, 0).getDate();
  let html = `<div class="cal-hdr">
    <button class="cal-nav" onclick="calNav('${calId}','${hiddenId}',-1)">‹</button>
    <span class="cal-title">${y}年${m}月</span>
    <button class="cal-today-btn" onclick="calPick('${calId}','${hiddenId}','${td}')">今日</button>
    <button class="cal-nav" onclick="calNav('${calId}','${hiddenId}',1)">›</button>
  </div><div class="cal-grid">`;
  WDAYS.forEach((w,i) => html += `<div class="cal-wday${i===0?' sun':i===6?' sat':''}">${w}</div>`);
  for (let i=0; i<firstDay; i++) html += '<div></div>';
  for (let d=1; d<=daysInM; d++) {
    const ds = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    let cls = 'cal-day';
    if (ds === sel) cls += ' cal-sel';
    else if (ds === td) cls += ' cal-today';
    html += `<div class="${cls}" onclick="calPick('${calId}','${hiddenId}','${ds}')">${d}</div>`;
  }
  html += '</div>';
  document.getElementById(calId).innerHTML = html;
}

let _calState = {};

function calNav(calId, hiddenId, dir) {
  if (!_calState[calId]) {
    const v = document.getElementById(hiddenId).value || today();
    const [y,m] = v.split('-').map(Number);
    _calState[calId] = {y,m};
  }
  _calState[calId].m += dir;
  if (_calState[calId].m > 12) { _calState[calId].m = 1; _calState[calId].y++; }
  if (_calState[calId].m < 1)  { _calState[calId].m = 12; _calState[calId].y--; }
  renderCal(calId, hiddenId);
}

function calPick(calId, hiddenId, ds) {
  document.getElementById(hiddenId).value = ds;
  const [y,m] = ds.split('-').map(Number);
  _calState[calId] = {y,m};
  renderCal(calId, hiddenId);
  closeAllCals();
}

// ══════════════════════════════════════════
// トースト
// ══════════════════════════════════════════
let _toastTimer;
function showToast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type?' '+type:'');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
